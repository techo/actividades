language: php

dist: bionic

php:
  - 7.2

services:
  - mysql

# El entorno real pisa la config de phpunit.xml (force="false"). En Travis MySQL
# corre en 127.0.0.1 como root sin password.
env:
  global:
    - DB_CONNECTION=mysql
    - DB_HOST=127.0.0.1
    - DB_PORT=3306
    - DB_DATABASE=laravel_test
    - DB_USERNAME=root
    - DB_PASSWORD=

cache:
  directories:
    - vendor
    - node_modules

before_script:
  - cp .env.travis .env
  - mysql -e 'CREATE DATABASE IF NOT EXISTS laravel_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;'
  - composer install --no-interaction --prefer-dist
  - php artisan key:generate
  - npm install
  - php artisan vue-i18n:generate
  - npm run dev   # genera public/mix-manifest.json; las vistas Blade usan mix()

script:
  - npm run test        # tests de Vue (mocha-webpack)
  - vendor/bin/phpunit  # tests de PHP (config en phpunit.xml: MySQL + memory_limit)
